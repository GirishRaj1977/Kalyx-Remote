name: kalyx_remote
description: Kalyx Remote — mobile controller for AIVue IPTV player.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0
  shared_preferences: ^2.3.2
  mobile_scanner: ^6.0.0
  wakelock_plus: ^1.3.4
  vibration: ^2.0.0
  permission_handler: ^11.3.1
  http: ^1.2.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
