name: kalyx_remote
description: Kalyx Remote — mobile controller for AIVue IPTV player.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0
  shared_preferences: ^2.3.2
  mobile_scanner: ^5.2.0
  wakelock_plus: ^1.3.4
  vibration: ^3.2.0
  permission_handler: ^11.3.1
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/favicon1.ico
    - assets/logo.svg
    - assets/logo1.svg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo1.svg"
  remove_alpha_ios: true
